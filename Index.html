        @keyframes slideUpBounce {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            60% { opacity: 1; transform: translateY(-5px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-slide-up {
            animation: slideUpBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* Animation ภาพพื้นหลังเลื่อน */
        @keyframes panImage {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

            background-image: url('https://images.unsplash.com/photo-1557682250-33bd709cbe85?auto=format&fit=crop&w=1600&q=80');

            animation: panImage 40s ease-in-out infinite alternate;

        /* เอฟเฟกต์แสงวิ่งผ่าน (Shimmer) */
        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-45deg); }
            100% { transform: translateX(250%) skewX(-45deg); }
        }
        .shimmer-box {
            position: relative;
            overflow: hidden;
        }
        .shimmer-box::after {
            content: '';
            position: absolute;
            top: 0; left: -50%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-45deg);
            animation: shimmer 4s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2) rotate(45deg); box-shadow: 0 0 15px 2px rgba(255,255,255,0.8); }
        }
        .sparkle {
            position: absolute;
            width: 4px; height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }
        /* สร้างแฉกดาววิบวับ */
        .sparkle::before, .sparkle::after {
            content: ''; position: absolute;
            background: white; border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .sparkle::before { width: 12px; height: 2px; }
        .sparkle::after { width: 2px; height: 12px; }

        .no-wrap { white-space: nowrap; }
    </style>
