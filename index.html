    const searchInput = document.getElementById('searchInput');
    const drugListBox = document.getElementById('drugListBox');
    const rightSelect = document.getElementById('rightSelect');
    const emptyState = document.getElementById('emptyState');
    const resultCard = document.getElementById('resultCard');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const searchIcon = document.getElementById('searchIcon');

    let currentShareData = null;
    let selectedDrugValue = "";
    const sortedDrugs = Object.keys(drugDatabase).sort((a, b) => a.localeCompare(b));

    // ฟังก์ชันวาดรายการยา
    function renderDrugList(filterText = '') {
        drugListBox.innerHTML = '';
        const filtered = sortedDrugs.filter(drug => drug.toLowerCase().includes(filterText.toLowerCase()));
        
        if (filtered.length === 0) {
            drugListBox.innerHTML = '<div class="p-4 text-slate-500 text-center text-sm font-medium">ไม่พบรายการยาที่ค้นหา</div>';
        } else {
            filtered.forEach(drug => {
                const div = document.createElement('div');
                const isSelected = selectedDrugValue === drug;
                
                div.className = `px-4 py-3 cursor-pointer border-b border-slate-100 last:border-0 text-sm md:text-[15px] transition-colors duration-150 flex items-center justify-between
                                ${isSelected ? 'bg-indigo-50 text-indigo-700 font-bold' : 'text-slate-700 hover:bg-slate-50 font-medium'}`;
                
                div.innerHTML = `
                    <span>${drug}</span>
                    ${isSelected ? '<i class="fa-solid fa-check text-indigo-500"></i>' : ''}
                `;

                div.onclick = () => { 
                    selectedDrugValue = drug;
                    searchInput.value = drug; // กำหนดค่า input เป็นชื่อยา
                    
                    // ซ่อน Icon แว่นขยาย และแสดงปุ่ม X
                    searchIcon.classList.add('hidden');
                    clearSearchBtn.classList.remove('hidden');
                    
                    renderDrugList(drug); // ค้นหาเฉพาะคำนี้ ทำให้เหลือแค่รายการเดียว
                    updateResult();
                };
                drugListBox.appendChild(div);
            });
        }
    }

    // ฟังก์ชันล้างค่าค้นหา
    function clearSearch() {
        selectedDrugValue = "";
        searchInput.value = "";
        searchIcon.classList.remove('hidden');
        clearSearchBtn.classList.add('hidden');
        renderDrugList();
        updateResult();
        searchInput.focus();
    }

    // แสดงรายการยาทั้งหมดตอนโหลดหน้า
    renderDrugList();

    // กรองรายการยาเมื่อพิมพ์
    searchInput.addEventListener('input', (e) => {
        if(e.target.value !== selectedDrugValue) {
            selectedDrugValue = ""; 
            searchIcon.classList.remove('hidden');
            clearSearchBtn.classList.add('hidden');
        }
        renderDrugList(e.target.value);
        updateResult();
    });

    // ทริกเกอร์ตอนเลือกสิทธิการรักษา
    rightSelect.addEventListener('change', updateResult);

    function updateResult() {
        const selectedRight = rightSelect.value;

        // เช็คว่าเลือกยาและสิทธิครบหรือยัง
        if (!selectedDrugValue || !selectedRight || !drugDatabase[selectedDrugValue]) {
            resultCard.classList.add('hidden');
            emptyState.classList.remove('hidden');
            currentShareData = null;
            return;
        }

        const data = drugDatabase[selectedDrugValue][selectedRight];
        let displayDetail = data.detail;
        if (data.condition === "Not Approved" && displayDetail.includes("ไม่อนุมัติสิทธิ์")) {
            displayDetail = "ไม่อยู่ในเงื่อนไขการเบิกจ่ายตามสิทธิการรักษา หากประสงค์ใช้ยา ผู้ป่วยต้องชำระค่าใช้จ่ายเอง";
        }

        currentShareData = { drug: selectedDrugValue, trade: data.trade, right: selectedRight, condition: data.condition, detail: displayDetail, pap: data.pap || "" };
        
        emptyState.classList.add('hidden');
        resultCard.classList.remove('hidden');
        
        resultCard.classList.remove('animate-slide-up');
        void resultCard.offsetWidth;
        resultCard.classList.add('animate-slide-up');

        let theme = {};
        if (data.condition === "Not Approved") { theme = { border: "border-red-200", bg: "bg-red-50", icon: "fa-circle-xmark", iconColor: "text-red-500", textAlert: "text-red-700", badgeBg: "bg-red-100", badgeText: "text-red-800" }; } 
        else if (data.condition === "OCPA") { theme = { border: "border-indigo-200", bg: "bg-indigo-50", icon: "fa-laptop-medical", iconColor: "text-indigo-500", textAlert: "text-indigo-800", badgeBg: "bg-indigo-600", badgeText: "text-white" }; } 
        else if (data.condition === "จ.2") { theme = { border: "border-emerald-200", bg: "bg-emerald-50", icon: "fa-file-signature", iconColor: "text-emerald-500", textAlert: "text-emerald-800", badgeBg: "bg-emerald-500", badgeText: "text-white" }; } 
        else if (data.condition === "ว.34") { theme = { border: "border-amber-200", bg: "bg-amber-50", icon: "fa-credit-card", iconColor: "text-amber-500", textAlert: "text-amber-800", badgeBg: "bg-amber-500", badgeText: "text-white" }; } 
        else { theme = { border: "border-slate-200", bg: "bg-slate-50", icon: "fa-check-circle", iconColor: "text-slate-500", textAlert: "text-slate-800", badgeBg: "bg-slate-200", badgeText: "text-slate-700" }; }

        const tradeNameHTML = data.trade === "-" ? `<span class="text-red-500 font-medium text-base md:text-lg">ไม่มีสิทธิ์เบิกจ่าย</span>` : `<span class="text-slate-900 font-bold text-lg md:text-2xl tracking-wide">${data.trade}</span>`;
        const actionPrefix = data.condition === "Not Approved" ? "ผลลัพธ์:" : "ข้อควรปฏิบัติ:";

        let papHtml = "";
        if (data.pap) {
            papHtml = `
            <div class="mt-4 md:mt-5 bg-gradient-to-r from-amber-50 to-yellow-50/30 border border-amber-200/60 p-4 md:p-5 rounded-2xl flex items-start gap-3 md:gap-4 shadow-sm relative overflow-hidden group w-full">
                <div class="absolute -right-4 -top-4 text-amber-500/10 text-6xl group-hover:rotate-12 transition-transform duration-500"><i class="fa-solid fa-gift"></i></div>
                <div class="bg-amber-100/80 p-2 md:p-2.5 rounded-xl z-10 shrink-0 shadow-sm border border-amber-200 animate-pulse">
                    <i class="fa-solid fa-gift text-amber-600 text-lg md:text-xl"></i>
                </div>
                <div class="z-10 min-w-0 flex-1">
                    <span class="block text-xs md:text-sm font-bold text-amber-900 mb-1">โครงการช่วยเหลือผู้ป่วย (PAP):</span>
                    <p class="text-amber-800 font-medium text-xs md:text-sm leading-relaxed break-words">${data.pap}</p>
                </div>
            </div>`;
        }

        resultCard.innerHTML = `
            <div class="bg-white border-2 ${theme.border} rounded-2xl md:rounded-3xl overflow-hidden shadow-lg shadow-slate-200/50 w-full relative">
                <div id="slip-content" class="bg-white flex flex-col">
                    
                    <div class="${theme.bg} px-4 md:px-6 py-4 border-b ${theme.border} flex flex-row items-center justify-between gap-2">
                        <div class="flex items-center gap-2 md:gap-3">
                            <div class="bg-white p-1.5 md:p-2 rounded-xl shadow-sm shimmer-box">
                                <i class="fa-solid ${theme.icon} ${theme.iconColor} text-lg md:text-xl w-5 md:w-6 text-center"></i>
                            </div>
                            <div class="flex flex-col">
                                <span class="font-bold text-[15px] md:text-lg ${theme.textAlert}">${data.condition === 'Not Approved' ? 'ไม่อนุมัติสิทธิ์' : 'อนุมัติให้ใช้ได้'}</span>
                                <span class="text-[10px] md:text-xs text-slate-500 font-medium">แบบสรุปเงื่อนไขการใช้ยา</span>
                            </div>
                        </div>
                        <span class="px-3 md:px-4 py-1 md:py-1.5 text-[10px] md:text-xs font-bold rounded-full ${theme.badgeBg} ${theme.badgeText} shadow-sm border border-black/5 tracking-wide whitespace-nowrap">
                            ${data.condition}
                        </span>
                    </div>

                    <div class="p-4 md:p-8 flex-1">
                        <div class="flex flex-col sm:flex-row gap-3 md:gap-4 mb-4 md:mb-6">
                            <div class="bg-slate-50/80 p-3 md:p-4 rounded-xl border border-slate-100 flex-1 min-w-0">
                                <span class="block text-[10px] md:text-[11px] text-slate-500 font-bold mb-1 uppercase tracking-widest">ชื่อสามัญ (Generic)</span>
                                <span class="text-slate-800 font-semibold text-[15px] md:text-lg break-words block">${selectedDrugValue}</span>
                            </div>
                            <div class="bg-slate-50/80 p-3 md:p-4 rounded-xl border border-slate-100 flex-1 min-w-0">
                                <span class="block text-[10px] md:text-[11px] text-slate-500 font-bold mb-1 uppercase tracking-widest">สิทธิการรักษา</span>
                                <span class="text-slate-800 font-semibold text-[15px] md:text-lg break-words block">${selectedRight}</span>
                            </div>
                        </div>
                        <div class="mb-4 md:mb-6 flex flex-col items-start w-full">
                            <span class="block text-xs md:text-sm text-slate-500 font-semibold mb-2">ชื่อการค้าที่ระบบอนุมัติ (Trade Name)</span>
                            <div class="bg-indigo-50/50 py-2.5 md:py-3 px-4 md:px-6 rounded-xl inline-block border border-indigo-100 shadow-sm max-w-full overflow-hidden w-full sm:w-auto text-center sm:text-left">
                                ${tradeNameHTML}
                            </div>
                        </div>
                        <div class="bg-slate-50 border-l-4 border-slate-400 p-4 md:p-5 rounded-r-xl rounded-l-sm shadow-sm relative w-full">
                            <span class="block text-[11px] md:text-xs font-bold text-slate-700 mb-1.5 md:mb-2 uppercase tracking-wide">${actionPrefix}</span>
                            <p class="text-slate-700 font-medium text-[13px] md:text-[15px] leading-relaxed break-words">${displayDetail}</p>
                        </div>
                        ${papHtml}
                    </div>

                    <div class="px-5 md:px-8 py-3 bg-slate-50 border-t border-slate-100 flex justify-between items-center text-[10px] md:text-xs text-slate-400 font-medium">
                        <span><i class="fa-solid fa-hospital mr-1 text-slate-300"></i>รพ.สกลนคร</span>
                        <span>ข้อมูล ณ วันที่: ${new Date().toLocaleDateString('th-TH')}</span>
                    </div>

                </div>
                
                <div class="bg-white border-t border-slate-100 p-4 md:p-6 flex flex-col sm:flex-row gap-2.5 sm:gap-3 justify-center w-full shadow-[0_-5px_15px_rgba(0,0,0,0.02)]" data-html2canvas-ignore="true">
                    <button onclick="shareToLine()" class="w-full sm:w-auto flex justify-center items-center gap-2 bg-[#00B900] hover:bg-[#009900] text-white px-4 py-2.5 md:py-3 rounded-xl text-sm md:text-base font-semibold shadow-sm transition-all hover:shadow-md">
                        <i class="fa-brands fa-line text-lg"></i> ส่ง LINE
                    </button>
                    <button onclick="downloadSlip()" class="w-full sm:w-auto flex justify-center items-center gap-2 bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2.5 md:py-3 rounded-xl text-sm md:text-base font-semibold shadow-sm transition-all hover:shadow-md">
                        <i class="fa-solid fa-download"></i> บันทึกเป็นรูปภาพ
                    </button>
                    <button onclick="copyData()" class="w-full sm:w-auto flex justify-center items-center gap-2 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 px-4 py-2.5 md:py-3 rounded-xl text-sm md:text-base font-semibold shadow-sm transition-all hover:shadow-md">
                        <i class="fa-solid fa-copy text-slate-400"></i> คัดลอก
                    </button>
                </div>
            </div>
        `;
    }

    function generateShareText() {
        if (!currentShareData) return "";
        const d = currentShareData;
        
        // แก้บั๊กคัดกรองข้อมูล: ถอด HTML ออกเฉพาะ tag ที่เป็น span (ป้องกันสัญลักษณ์ < 75 หาย)
        const cleanDetail = d.detail.replace(/<br\s*[\/]?>/gi, "\n").replace(/<\/?span[^>]*>/gi, '');
        const cleanPap = d.pap ? d.pap.replace(/<br\s*[\/]?>/gi, "\n").replace(/<\/?span[^>]*>/gi, '') : "";

        let text = `🏥 ตรวจสอบสิทธิการใช้ยา\n`;
        text += `──────────────\n`;
        text += `💊 ชื่อสามัญ: ${d.drug}\n`;
        text += `🏷️ ชื่อการค้า: ${d.trade}\n`;
        text += `💳 สิทธิ: ${d.right} (${d.condition})\n`;
        text += `──────────────\n`;
        text += `⚠️ เงื่อนไข:\n${cleanDetail}\n`;
        if (cleanPap) text += `\n🎁 ${cleanPap}\n`;
        return text;
    }

    function shareToLine() {
        const text = generateShareText();
        window.open(`https://line.me/R/msg/text/?${encodeURIComponent(text)}`, '_blank');
    }

    function copyData() {
        navigator.clipboard.writeText(generateShareText()).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        });
    }

    function downloadSlip() {
        // เพิ่มค่า Scale เป็น 3 เพื่อให้รูปภาพมีความคมชัดสูง
        html2canvas(document.getElementById('slip-content'), { 
            scale: 3, 
            backgroundColor: '#ffffff', 
            useCORS: true 
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `สิทธิยา_${currentShareData.drug}_${currentShareData.right}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }
</script>

</body>
</html>
